<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMVY</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="buho.jpg" alt="Buho" width="50" loading="lazy">     <h1>MIMBY</h1>
        <nav>
            <button class="btn1"> Inicio </button>

            <button class="btn3"> Deportes </button>
            <button class="btn4"> Inicio sesion </button>
        </nav>
    </header>
    <main>
        <section id="inicio" class="inicio">
            <h2>Bienvenido a MIMBY</h2>

        <section id="informacion" class="informacion">
            <h2>Acerca de esta página</h2>

        </section>

    <div class="carrusel">

        </div>
        <div class="imagenes">
            <div id="img">
                <img class="img" src="imagen1.webp" alt="imagen1" loading="lazy">
            </div>
                <div id="texto" class="texto">
                <h3>Futbol</h3>
                <p>Aquí encontraras toda la información sobre futbol</p>
            </div>
        </div>
        <div class="adelante" id="adelante">
            <img src="adelante.png" alt="adelante" loading="lazy">
        </div>

    <div class="puntos" id="puntos"></div>
    <script src="script.js"></script>
